<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=520, initial-scale=1.0">
  <title>JS Auto Forward</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <!-- 头部 -->
    <header class="header">
      <div class="header-left">
        <div class="logo">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 18 22 12 16 6"></polyline>
            <polyline points="8 6 2 12 8 18"></polyline>
            <line x1="12" y1="2" x2="12" y2="22" opacity="0.3"></line>
          </svg>
        </div>
        <div class="header-title">
          <h1>JS Auto Forward</h1>
          <span class="header-subtitle">本地调试转发</span>
        </div>
      </div>
      <div class="header-right">
        <label class="switch" title="全局开关">
          <input type="checkbox" id="globalToggle" checked>
          <span class="slider"></span>
        </label>
      </div>
    </header>

    <!-- 本地服务器配置 -->
    <section class="server-config">
      <div class="config-row">
        <label class="config-label">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
            <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
            <line x1="6" y1="6" x2="6.01" y2="6"></line>
            <line x1="6" y1="18" x2="6.01" y2="18"></line>
          </svg>
          本地服务器
        </label>
        <input type="text" id="serverBase" class="input-server" placeholder="http://localhost:3321" spellcheck="false">
      </div>
    </section>

    <!-- 规则列表 -->
    <section class="rules-section">
      <div class="rules-header">
        <span class="rules-title">转发规则</span>
        <span class="rules-count" id="rulesCount">0 条</span>
      </div>
      <div class="rules-list" id="rulesList">
        <!-- 规则项动态渲染 -->
      </div>
      <div class="empty-state" id="emptyState">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
          <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
          <polyline points="13 2 13 9 20 9"></polyline>
        </svg>
        <p>暂无转发规则</p>
        <p class="empty-hint">点击下方按钮添加规则</p>
      </div>
    </section>

    <!-- 添加规则 -->
    <section class="add-section">
      <button class="btn-add" id="btnAdd">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
        添加转发规则
      </button>
    </section>

    <!-- 新增/编辑规则表单（模态） -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <div class="modal-header">
          <h2 id="modalTitle">添加转发规则</h2>
          <button class="btn-close" id="btnModalClose">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">规则名称</label>
            <input type="text" id="inputName" class="form-input" placeholder="例如：商品详情页插件" spellcheck="false">
          </div>
          <div class="form-group">
            <label class="form-label">远程 JS URL</label>
            <input type="text" id="inputRemoteUrl" class="form-input" placeholder="从浏览器网络面板复制的 JS 地址" spellcheck="false">
            <span class="form-hint">支持完整 URL 或 URL 片段匹配</span>
          </div>
          <div class="form-group">
            <label class="form-label">本地 JS 路径</label>
            <input type="text" id="inputLocalUrl" class="form-input" placeholder="例如：D:\LF\project\dist\index.js" spellcheck="false">
            <span class="form-hint">填写本地文件的完整路径，会自动通过本地服务器代理</span>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-cancel" id="btnCancel">取消</button>
          <button class="btn btn-save" id="btnSave">保存</button>
        </div>
      </div>
    </div>

    <!-- 底部提示 -->
    <footer class="footer">
      <span class="footer-tip">提示：添加规则后需刷新目标页面生效</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
